name: Genesys CX as Code Deployment

on:
  push:
    branches: [ main ]
    # Case-insensitive matching using glob expansion
    paths:
      - 'queue/**'
      - 'Queue/**'
      - 'skill/**'
      - 'Skill/**'
      - 'knowledge/**'
      - 'Knowledge/**'

  workflow_dispatch:
    inputs:
      destroy:
        description: 'Set to true to destroy changed directory resources'
        required: false
        default: 'false'

jobs:
  terraform:
    runs-on: ubuntu-latest

    env:
      GENESYSCLOUD_OAUTHCLIENT_ID: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_ID }}
      GENESYSCLOUD_OAUTHCLIENT_SECRET: ${{ secrets.GENESYSCLOUD_OAUTHCLIENT_SECRET }}
      GENESYSCLOUD_REGION: ${{ secrets.GENESYSCLOUD_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # FIX: required for correct diff detection

      - name: Detect changed directories (case-insensitive)
        id: changes
        shell: bash
        run: |
          set -e
          # Collect top-level dirs that changed under queue/, skill/, knowledge/
          dirs=$(git diff --name-only origin/main...HEAD \
            | grep -Ei '^(queue|skill|knowledge)/' \
            | cut -d/ -f1 \
            | sort -u | tr '\n' ' ')

          echo "changed_dirs=$dirs" >> $GITHUB_OUTPUT

      - name: Show changed directories
        run: echo "Changed directories: ${{ steps.changes.outputs.changed_dirs }}"

      - name: Run Terraform for changed directories
        if: ${{ steps.changes.outputs.changed_dirs != '' }}
        shell: bash
        run: |
          set -euo pipefail

          for dir in ${{ steps.changes.outputs.changed_dirs }}; do
            echo "──────────────────────────────────────"
            echo "Processing directory: $dir"
            echo "──────────────────────────────────────"

            cd "$dir"

            # Initialize
            terraform init -no-color

            # Validate
            terraform validate -no-color

            # Plan
            terraform plan -no-color

            # Apply / Destroy
            if [ "${{ github.event.inputs.destroy }}" = "true" ]; then
              echo "Destroying resources in $dir"
              terraform destroy -auto-approve -no-color
            else
              echo "Applying resources in $dir"
              terraform apply -auto-approve -no-color
            fi

            cd - >/dev/null
          done

      - name: No changes detected
        if: ${{ steps.changes.outputs.changed_dirs == '' }}
        run: echo "No Terraform directories changed. Skipping deployment."
